services:
  app:
    build: .
    image: telegram-discord-forwarder
    container_name: forwarder
    restart: unless-stopped
    # tini as PID 1 reaps the tsx/node process tree cleanly on stop.
    init: true
    env_file:
      - .env
    # These override anything in .env so the container always targets the volume
    # and runs in production mode regardless of local dev values.
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: file:/data/forwarder.db
    ports:
      - "3000:3000"
    volumes:
      - forwarder-data:/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  forwarder-data:
